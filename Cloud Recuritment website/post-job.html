<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Job</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="auth-container">

<h1>Post A Job</h1>

<form id="jobForm">

<input type="text" id="title" placeholder="Job Title" required>

<input type="text" id="company" placeholder="Company Name" required>

<input type="text" id="location" placeholder="Location" required>

<input type="text" id="salary" placeholder="Salary" required>

<textarea id="description" placeholder="Job Description"></textarea>

<button type="submit">
Post Job
</button>

</form>

</div>

<script type="module" src="jobs.js"></script>

</body>

</html>
